<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {{
            font-family: 'Cinzel';
            src: url('file://{font_path}/Cinzel-Bold.ttf') format('truetype');
            font-weight: bold;
        }}
        @font-face {{
            font-family: 'Cinzel';
            src: url('file://{font_path}/Cinzel-Regular.ttf') format('truetype');
            font-weight: normal;
        }}

        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}

        body {{
            width: 960px;
            height: 540px;
            font-family: 'Cinzel', 'Georgia', serif;
            background: #0d0d0f;
            color: #fff;
            overflow: hidden;
            position: relative;
        }}

        /* === MAGENTA STREAKS === */
        body::before {{
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                linear-gradient(152deg, transparent 30%, rgba(180,0,90,0.06) 42%, transparent 48%),
                linear-gradient(152deg, transparent 35%, rgba(180,0,90,0.10) 47%, transparent 53%),
                linear-gradient(152deg, transparent 40%, rgba(180,0,90,0.15) 52%, transparent 58%),
                linear-gradient(152deg, transparent 45%, rgba(180,0,90,0.20) 57%, transparent 63%),
                linear-gradient(152deg, transparent 50%, rgba(180,0,90,0.26) 62%, transparent 68%),
                linear-gradient(152deg, transparent 55%, rgba(180,0,90,0.32) 67%, transparent 73%),
                linear-gradient(152deg, transparent 60%, rgba(180,0,90,0.38) 72%, transparent 78%),
                linear-gradient(152deg, transparent 65%, rgba(180,0,90,0.44) 77%, transparent 84%),
                linear-gradient(152deg, transparent 72%, rgba(180,0,90,0.38) 82%, transparent 90%),
                linear-gradient(152deg, transparent 78%, rgba(180,0,90,0.28) 88%, transparent 95%);
            pointer-events: none;
            z-index: 0;
        }}

        /* === SIMPLE BORDER === */
        .border-frame {{
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 4px;
            z-index: 3;
            pointer-events: none;
        }}

        /* === CONTENT === */
        .content {{
            position: relative;
            z-index: 2;
            padding: 20px 26px 14px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }}

        /* Title */
        .title {{
            text-align: center;
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
            margin-bottom: 2px;
        }}

        /* === MAIN 2-COLUMN LAYOUT: bans left, maps right === */
        .main-area {{
            display: grid;
            grid-template-columns: 370px 1fr;
            gap: 12px;
            flex: 1;
            min-height: 0;
        }}

        /* --- LEFT: 4x2 ban grid (Bo3 = 8 bans) --- */
        .bans-grid {{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: 1fr 1fr;
            gap: 5px;
            align-content: stretch;
        }}

        .ban-thumb {{
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }}

        .ban-thumb img {{
            width: 100%;
            flex: 1;
            object-fit: cover;
            display: block;
        }}

        .ban-overlay {{
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
        }}

        .ban-overlay svg {{
            width: 28px;
            height: 28px;
        }}

        .ban-caption {{
            background: rgba(20,20,26,0.88);
            padding: 3px 2px;
            text-align: center;
            line-height: 1.15;
            flex-shrink: 0;
        }}

        .ban-captain {{
            font-size: 7px;
            font-weight: bold;
            letter-spacing: 0.3px;
        }}

        .ban-captain.c1 {{ color: #ED4245; }}
        .ban-captain.c2 {{ color: #00D4AA; }}

        .ban-map-name {{
            font-size: 8px;
            font-weight: normal;
            color: rgba(180,180,190,0.9);
        }}

        .ban-placeholder {{
            width: 100%;
            flex: 1;
            background: rgba(40,40,48,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: rgba(120,120,135,0.8);
        }}

        /* --- RIGHT: played maps + agents below --- */
        .maps-column {{
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-height: 0;
        }}

        .played-maps-row {{
            display: flex;
            gap: 6px;
            justify-content: center;
            flex: 1;
            min-height: 0;
        }}

        .played-map {{
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            flex: 1;
        }}

        .played-map img {{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }}

        /* Map banner - centered vertically */
        .map-banner {{
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            transform: translateY(-50%);
            padding: 6px 8px 6px 16px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            clip-path: polygon(10% 0%, 100% 0%, 100% 100%, 0% 100%);
        }}

        .map-banner.pick-c1 {{ background: rgba(237,66,69,0.82); }}
        .map-banner.pick-c2 {{ background: rgba(0,212,170,0.82); }}
        .map-banner.decider  {{ background: rgba(254,231,92,0.88); color: #1a1a1a; text-shadow: none; }}

        .map-placeholder {{
            width: 100%;
            height: 100%;
            background: rgba(40,40,48,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: rgba(120,120,135,0.8);
        }}

        .side-info {{
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 9px;
            color: rgba(220,220,230,0.9);
        }}

        /* Agents row below played maps */
        .agents-row {{
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-shrink: 0;
        }}

        .agent-map-group {{
            flex: 1;
            display: flex;
            justify-content: center;
            gap: 16px;
        }}

        .agent-col {{
            text-align: center;
        }}

        .agent-col-header {{
            font-size: 8px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }}

        .agent-col-header.bans {{ color: #ED4245; }}
        .agent-col-header.protects {{ color: #00D4AA; }}

        .agent-icons {{
            display: flex;
            gap: 4px;
            justify-content: center;
        }}

        .agent-icon-wrap {{
            text-align: center;
        }}

        .agent-icon-wrap img {{
            width: 28px;
            height: 28px;
            border-radius: 4px;
            object-fit: cover;
            display: block;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(30,30,38,0.8);
        }}

        .agent-icon-placeholder {{
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 2px solid rgba(255,255,255,0.35);
            background: rgba(40,40,48,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: rgba(120,120,135,0.8);
        }}

        /* === BO1: 5x2 ban grid + single large map === */
        body.bo1 .main-area {{
            grid-template-columns: 480px 1fr;
        }}

        body.bo1 .bans-grid {{
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: 1fr 1fr;
        }}

        body.bo1 .played-map {{
            flex: none;
            width: 100%;
        }}
    </style>
</head>
<body class="{body_class}">
    <div class="border-frame"></div>

    <div class="content">
        <div class="title">{title}</div>

        <div class="main-area">
            <!-- LEFT: all bans in a grid -->
            <div class="bans-grid">
                {bans_html}
            </div>

            <!-- RIGHT: played maps + agent icons -->
            <div class="maps-column">
                <div class="played-maps-row">
                    {played_maps_html}
                </div>
                <div class="agents-row">
                    {agents_html}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
