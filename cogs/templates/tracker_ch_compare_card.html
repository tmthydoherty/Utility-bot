<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {{
            font-family: 'NotoSans';
            src: url('file://{font_path}/NotoSans-Regular.ttf') format('truetype');
            font-weight: normal;
        }}
        @font-face {{
            font-family: 'NotoSans';
            src: url('file://{font_path}/NotoSans-Bold.ttf') format('truetype');
            font-weight: bold;
        }}

        * {{ margin: 0; padding: 0; box-sizing: border-box; }}

        body {{
            width: 700px;
            font-family: 'NotoSans', 'Segoe UI', sans-serif;
            font-weight: bold;
            background: #1a1b1e;
            color: #ffffff;
            padding: 0;
        }}

        .card {{
            background: #2b2d31;
            border-radius: 12px;
            overflow: hidden;
            margin: 8px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }}

        .header {{
            padding: 18px 22px;
            background: #313338;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
        }}

        .header-title {{
            font-size: 20px;
            color: #ffffff;
        }}

        .header-subtitle {{
            font-size: 14px;
            color: #949ba4;
            margin-top: 2px;
        }}

        /* --- VS HEADER --- */
        .vs-section {{
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .vs-channel {{
            display: flex;
            align-items: center;
            gap: 10px;
        }}

        .vs-channel.right {{
            flex-direction: row-reverse;
        }}

        .vs-hash {{
            font-size: 28px;
            color: #949ba4;
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }}

        .vs-name {{
            font-size: 17px;
            color: #ffffff;
        }}

        .vs-type {{
            font-size: 13px;
            color: #949ba4;
        }}

        .vs-badge {{
            font-size: 24px;
            color: #949ba4;
            padding: 0 16px;
        }}

        /* --- STAT ROWS --- */
        .stat-grid {{
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
        }}

        .stat-row {{
            display: contents;
        }}

        .stat-cell {{
            padding: 12px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }}

        .stat-cell.left {{
            text-align: left;
        }}

        .stat-cell.right {{
            text-align: right;
        }}

        .stat-cell.center {{
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }}

        .stat-label {{
            font-size: 12px;
            color: #949ba4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }}

        .stat-value {{
            font-size: 20px;
            color: #ffffff;
        }}

        .stat-value.winner {{
            color: #23a559;
        }}

        .stat-divider {{
            width: 1px;
            background: rgba(255, 255, 255, 0.06);
            margin: 4px 0;
        }}

        /* --- CHART SECTION --- */
        .chart-section {{
            padding: 16px 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .chart-header {{
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }}

        .chart-title {{
            font-size: 14px;
            color: #949ba4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }}

        .chart-legend {{
            display: flex;
            gap: 16px;
        }}

        .legend-item {{
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #b5bac1;
        }}

        .dot {{
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }}

        .dot-green {{ background: #23a559; }}
        .dot-orange {{ background: #f0b232; }}

        .chart-svg {{
            width: 100%;
            height: 100px;
            display: block;
        }}

        .chart-dates {{
            display: flex;
            justify-content: space-between;
            padding-top: 4px;
        }}

        .chart-date {{
            font-size: 11px;
            color: #6d6f78;
        }}

        /* --- TOP CONTRIBUTORS COMPARISON --- */
        .contribs-section {{
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .contribs-col {{
            padding: 14px 22px;
        }}

        .contribs-col:first-child {{
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .contribs-label {{
            font-size: 12px;
            color: #949ba4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }}

        .contrib-item {{
            display: flex;
            align-items: center;
            padding: 3px 0;
            gap: 6px;
        }}

        .contrib-rank {{
            font-size: 13px;
            color: #949ba4;
            min-width: 20px;
        }}

        .contrib-name {{
            font-size: 14px;
            color: #e0e1e5;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }}

        .contrib-count {{
            font-size: 13px;
            color: #949ba4;
        }}

        /* --- FOOTER --- */
        .footer {{
            display: flex;
            justify-content: space-between;
            padding: 10px 22px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(0, 0, 0, 0.15);
        }}

        .footer-text {{
            font-size: 12px;
            color: #5a5d6b;
        }}

        .footer-highlight {{
            color: #e0e1e5;
        }}
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-title">Compare Channels</div>
            <div class="header-subtitle">{period_label}</div>
        </div>

        <div class="vs-section">
            <div class="vs-channel">
                <div class="vs-hash">#</div>
                <div>
                    <div class="vs-name">{name_1}</div>
                    <div class="vs-type">{type_1}</div>
                </div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="vs-channel right">
                <div class="vs-hash">#</div>
                <div style="text-align:right">
                    <div class="vs-name">{name_2}</div>
                    <div class="vs-type">{type_2}</div>
                </div>
            </div>
        </div>

        <div class="stat-grid">
            {stats_rows_html}
        </div>

        <div class="chart-section">
            <div class="chart-header">
                <div class="chart-title">Message Activity</div>
                <div class="chart-legend">
                    <div class="legend-item"><span class="dot dot-green"></span> {name_1}</div>
                    <div class="legend-item"><span class="dot dot-orange"></span> {name_2}</div>
                </div>
            </div>
            <svg class="chart-svg" viewBox="0 0 {chart_width} 100" preserveAspectRatio="none">
                <polyline points="{line_1_points}" fill="none" stroke="#23a559" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="{line_2_points}" fill="none" stroke="#f0b232" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <div class="chart-dates">
                <span class="chart-date">{chart_date_start}</span>
                <span class="chart-date">{chart_date_end}</span>
            </div>
        </div>

        <div class="contribs-section">
            <div class="contribs-col">
                <div class="contribs-label">Top Contributors</div>
                {contribs_1_html}
            </div>
            <div class="contribs-col">
                <div class="contribs-label">Top Contributors</div>
                {contribs_2_html}
            </div>
        </div>

        <div class="footer">
            <div class="footer-text">Server Lookback: <span class="footer-highlight">{period_label}</span> &mdash; Timezone: UTC</div>
            <div class="footer-text">Powered by Vibey</div>
        </div>
    </div>
</body>
</html>
