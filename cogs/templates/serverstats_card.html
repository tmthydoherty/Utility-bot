<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {{
            font-family: 'Cinzel';
            src: url('file://{font_path}/Cinzel-Regular.ttf') format('truetype');
            font-weight: normal;
        }}
        @font-face {{
            font-family: 'Cinzel';
            src: url('file://{font_path}/Cinzel-Bold.ttf') format('truetype');
            font-weight: bold;
        }}

        * {{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }}

        body {{
            width: 580px;
            font-family: 'Cinzel', 'Segoe UI', sans-serif;
            font-weight: bold;
            background: #0a0b0d;
            color: #ffffff;
            padding: 0;
        }}

        .card {{
            background: linear-gradient(170deg, #101318 0%, #0b0c10 40%, #0e1017 100%);
            border: 2px solid rgba({accent_r}, {accent_g}, {accent_b}, 0.25);
            border-radius: 12px;
            overflow: hidden;
            margin: 8px;
        }}

        /* --- HEADER --- */
        .header {{
            background: linear-gradient(135deg, rgba({accent_r}, {accent_g}, {accent_b}, 0.12) 0%, rgba({accent_r}, {accent_g}, {accent_b}, 0.02) 100%);
            padding: 20px 20px 16px;
            text-align: center;
            border-bottom: 2px solid rgba({accent_r}, {accent_g}, {accent_b}, 0.18);
            position: relative;
        }}

        .header::before {{
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 3px;
            background: linear-gradient(90deg, transparent, {accent_color}, transparent);
        }}

        .title {{
            font-size: 24px;
            color: #ffffff;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }}

        .subtitle {{
            font-size: 12px;
            color: #a0a4b8;
            letter-spacing: 2px;
            text-transform: uppercase;
        }}

        /* --- OVERVIEW STATS --- */
        .overview {{
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .overview-item {{
            padding: 14px 6px;
            text-align: center;
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .overview-item:last-child {{
            border-right: none;
        }}

        .overview-item .ov-value {{
            font-size: 22px;
            color: #ffffff;
            line-height: 1;
            margin-bottom: 4px;
        }}

        .overview-item .ov-label {{
            font-size: 10px;
            color: #8a8fa6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }}

        .overview-item.accent .ov-value {{
            color: {accent_color};
        }}

        /* --- COMBAT STATS ROW --- */
        .combat-row {{
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.015);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }}

        .combat-stat {{
            display: flex;
            align-items: center;
            gap: 5px;
        }}

        .combat-stat .cs-value {{
            font-size: 13px;
            color: #d0d3e0;
        }}

        .combat-stat .cs-label {{
            font-size: 10px;
            color: #8a8fa6;
            text-transform: uppercase;
        }}

        .cs-dot {{
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #2a2d40;
        }}

        /* --- CONTENT BODY --- */
        .content {{
            padding: 14px 16px 16px;
        }}

        /* --- SECTION HEADERS --- */
        .section {{
            margin-bottom: 14px;
        }}

        .section-header {{
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }}

        .section-header .sh-line {{
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba({accent_r}, {accent_g}, {accent_b}, 0.3), rgba({accent_r}, {accent_g}, {accent_b}, 0.05));
        }}

        .section-header .sh-line:first-child {{
            background: linear-gradient(90deg, rgba({accent_r}, {accent_g}, {accent_b}, 0.05), rgba({accent_r}, {accent_g}, {accent_b}, 0.3));
        }}

        .section-header .sh-title {{
            font-size: 12px;
            color: {accent_color};
            text-transform: uppercase;
            letter-spacing: 3px;
            white-space: nowrap;
        }}

        /* --- AGENT CHIPS (used for maps too) --- */
        .agents-wrap {{
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }}

        .agent-chip {{
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 4px 10px;
        }}

        .agent-name {{
            font-size: 11px;
            color: #d0d3e0;
        }}

        .agent-count {{
            font-size: 11px;
            color: {accent_color};
        }}

        /* --- LEADERBOARD GRID --- */
        .leaders-grid {{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }}

        .leader-card {{
            background: linear-gradient(180deg, rgba({accent_r}, {accent_g}, {accent_b}, 0.07) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba({accent_r}, {accent_g}, {accent_b}, 0.15);
            border-radius: 8px;
            padding: 12px 8px 10px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }}

        .leader-card::before {{
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, transparent, {accent_color}, transparent);
            border-radius: 1px;
        }}

        .leader-label {{
            font-size: 10px;
            color: #9298b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            line-height: 1.3;
        }}

        .min-games {{
            display: block;
            font-size: 8px;
            color: #4e5270;
            letter-spacing: 0.5px;
            margin-top: 1px;
        }}

        .leader-player {{
            font-size: 14px;
            color: #ffffff;
            margin-bottom: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }}

        .leader-value {{
            font-size: 18px;
            color: {accent_color};
        }}

        /* --- UTILITIES --- */
        .no-data {{
            color: #3a3c4e;
            font-size: 12px;
            text-align: center;
            padding: 14px;
        }}
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="title">{period_title}</div>
            <div class="subtitle">{game_name} Server Stats</div>
        </div>

        <div class="overview">
            <div class="overview-item">
                <div class="ov-value">{total_matches}</div>
                <div class="ov-label">Matches</div>
            </div>
            <div class="overview-item">
                <div class="ov-value">{total_players}</div>
                <div class="ov-label">Players</div>
            </div>
            <div class="overview-item accent">
                <div class="ov-value">{total_kills}</div>
                <div class="ov-label">Total Kills</div>
            </div>
            <div class="overview-item">
                <div class="ov-value">{hs_pct}%</div>
                <div class="ov-label">Headshot %</div>
            </div>
        </div>

        <div class="combat-row">
            <div class="combat-stat">
                <span class="cs-value">{total_deaths}</span>
                <span class="cs-label">Deaths</span>
            </div>
            <div class="cs-dot"></div>
            <div class="combat-stat">
                <span class="cs-value">{total_assists}</span>
                <span class="cs-label">Assists</span>
            </div>
            <div class="cs-dot"></div>
            <div class="combat-stat">
                <span class="cs-value">{total_damage}</span>
                <span class="cs-label">Damage</span>
            </div>
            <div class="cs-dot"></div>
            <div class="combat-stat">
                <span class="cs-value">{total_aces}</span>
                <span class="cs-label">Aces</span>
            </div>
        </div>

        <div class="content">
            <div class="section">
                <div class="section-header">
                    <div class="sh-line"></div>
                    <div class="sh-title">Leaderboards</div>
                    <div class="sh-line"></div>
                </div>
                <div class="leaders-grid">{leaders_html}</div>
            </div>

            <div class="section">
                <div class="section-header">
                    <div class="sh-line"></div>
                    <div class="sh-title">Maps</div>
                    <div class="sh-line"></div>
                </div>
                {maps_html}
            </div>

            <div class="section" style="margin-bottom: 0;">
                <div class="section-header">
                    <div class="sh-line"></div>
                    <div class="sh-title">Top Agents</div>
                    <div class="sh-line"></div>
                </div>
                <div class="agents-wrap">{agents_html}</div>
            </div>
        </div>
    </div>
</body>
</html>
