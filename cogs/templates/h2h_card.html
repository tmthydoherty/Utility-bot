<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @font-face {{
            font-family: 'Cinzel';
            src: url('file://{font_path}/Cinzel-Bold.ttf') format('truetype');
            font-weight: 700;
            font-display: block;
        }}

        * {{ margin: 0; padding: 0; box-sizing: border-box; }}

        body {{
            width: 1180px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: #ffffff;
            background: #050505;
            padding: 0;
        }}

        .card {{
            position: relative;
            overflow: hidden;
        }}

        .card-bg {{
            position: absolute;
            inset: 0;
            background: url('{bg_path}') center/cover no-repeat;
            z-index: 0;
        }}

        .card-overlay {{
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,
                rgba(0,0,0,0.30) 0%,
                rgba(0,0,0,0.40) 35%,
                rgba(0,0,0,0.50) 100%);
            z-index: 1;
        }}

        .content {{ position: relative; z-index: 2; }}

        /* ═══════ HEADER ═══════ */
        .header {{
            text-align: center;
            padding: 48px 40px 40px;
        }}
        .header .diamonds {{
            font-size: 18px;
            color: rgba(255,255,255,0.50);
            letter-spacing: 10px;
        }}
        .header h1 {{
            font-size: 76px;
            letter-spacing: 14px;
            text-transform: uppercase;
            color: #ffffff;
            margin: 10px 0 14px;
            text-shadow: 0 2px 24px rgba(255,255,255,0.15);
        }}
        .header .sub {{
            font-size: 28px;
            color: rgba(255,255,255,0.72);
            letter-spacing: 6px;
            text-transform: uppercase;
        }}

        .divider {{
            height: 1px;
            margin: 0 44px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22) 50%, transparent);
        }}

        /* ═══════ PLAYERS ═══════ */
        .players {{
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 40px 48px 36px;
            gap: 20px;
        }}
        .player {{
            display: flex;
            align-items: center;
            gap: 26px;
            min-width: 0;
        }}
        .player.right {{
            flex-direction: row-reverse;
            text-align: right;
            justify-self: end;
        }}
        .avatar-wrap {{
            width: 120px;
            height: 120px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.25);
            overflow: hidden;
            box-shadow: 0 4px 32px rgba(0,0,0,0.5);
        }}
        .avatar {{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }}
        .player-info {{
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
            max-width: 340px;
            overflow: hidden;
        }}
        .player-name {{
            font-size: 50px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #ffffff;
            line-height: 1.15;
            text-shadow: 0 2px 16px rgba(0,0,0,0.6);
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            word-break: break-word;
        }}
        .player-record {{
            font-size: 26px;
            color: rgba(255,255,255,0.72);
            letter-spacing: 2px;
        }}
        .vs-badge {{
            font-size: 38px;
            letter-spacing: 8px;
            text-transform: uppercase;
            padding: 18px 24px;
            border-radius: 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.14);
            color: #ffffff;
            flex-shrink: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.12);
            justify-self: center;
        }}

        /* ═══════ H2H RECORD ═══════ */
        .h2h-block {{
            margin: 0 40px 36px;
            padding: 40px 44px;
            border-radius: 18px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }}
        .h2h-label {{
            font-size: 24px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.65);
            margin-bottom: 18px;
        }}
        .h2h-score {{
            font-size: 100px;
            letter-spacing: 10px;
            line-height: 1;
            margin-bottom: 22px;
            color: #ffffff;
        }}
        .h2h-score .dash {{
            color: rgba(255,255,255,0.40);
            margin: 0 18px;
        }}
        .split-bar-container {{
            display: flex;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            margin: 0 80px;
        }}
        .bar-a {{
            background: linear-gradient(90deg, rgba(100,150,255,0.7), rgba(100,150,255,0.5));
        }}
        .bar-b {{
            background: linear-gradient(90deg, rgba(255,90,90,0.5), rgba(255,90,90,0.7));
        }}
        .split-bar-names {{
            display: flex;
            justify-content: space-between;
            margin: 0 80px;
            padding-top: 12px;
        }}
        .split-bar-names span {{
            font-size: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.65);
        }}
        .h2h-streak {{
            font-size: 26px;
            color: rgba(255,255,255,0.82);
            margin-top: 20px;
            letter-spacing: 1px;
        }}
        .form-row {{
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 18px;
        }}
        .form-dot {{
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }}
        .form-dot.win {{
            background: rgba(100,150,255,0.18);
            color: rgba(170,200,255,0.95);
            border: 1px solid rgba(100,150,255,0.35);
        }}
        .form-dot.loss {{
            background: rgba(255,90,90,0.14);
            color: rgba(255,160,160,0.95);
            border: 1px solid rgba(255,90,90,0.30);
        }}

        /* ═══════ SECTIONS ═══════ */
        .section {{ margin-bottom: 36px; }}
        .section-title {{
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 48px 22px;
            font-size: 26px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.72);
        }}

        /* ═══════ STAT ROWS ═══════ */
        .stat-grid {{ padding: 0 40px; }}
        .stat-row {{
            display: flex;
            align-items: center;
            padding: 22px 32px;
            margin-bottom: 8px;
            border-radius: 14px;
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,255,255,0.08);
        }}
        .stat-val {{
            flex: 1;
            font-size: 40px;
            color: rgba(255,255,255,0.58);
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }}
        .stat-val.left {{ text-align: right; padding-right: 36px; }}
        .stat-val.right {{ text-align: left; padding-left: 36px; }}
        .stat-val.better {{
            color: #ffffff;
            text-shadow: 0 0 16px rgba(255,255,255,0.25);
        }}
        .stat-label {{
            width: 280px;
            text-align: center;
            font-size: 24px;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 4px;
            flex-shrink: 0;
        }}

        /* ═══════ TEAMMATE SECTION ═══════ */
        .tm-summary {{
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 0 48px 28px;
        }}
        .tm-card {{
            text-align: center;
            padding: 28px 44px;
            border-radius: 14px;
            background: rgba(0,0,0,0.50);
            border: 1px solid rgba(255,255,255,0.10);
            min-width: 200px;
        }}
        .tm-val {{
            font-size: 54px;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }}
        .tm-label {{
            font-size: 20px;
            color: rgba(255,255,255,0.58);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 12px;
        }}

        .footer-pad {{ height: 24px; }}
    </style>
</head>
<body>
<div class="card">
    <div class="card-bg"></div>
    <div class="card-overlay"></div>
    <div class="content">

        <!-- Header -->
        <div class="header">
            <div class="diamonds">&#9670; &#9670; &#9670;</div>
            <h1>Head to Head</h1>
            <div class="sub">{game_name}</div>
        </div>
        <div class="divider"></div>

        <!-- Players -->
        <div class="players">
            <div class="player left">
                <div class="avatar-wrap">
                    <img class="avatar" src="{a_avatar}" alt="" onerror="this.style.display='none'"/>
                </div>
                <div class="player-info">
                    <div class="player-name">{a_name}</div>
                    <div class="player-record">{a_record} &middot; {a_wr}% WR</div>
                </div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="player right">
                <div class="avatar-wrap">
                    <img class="avatar" src="{b_avatar}" alt="" onerror="this.style.display='none'"/>
                </div>
                <div class="player-info">
                    <div class="player-name">{b_name}</div>
                    <div class="player-record">{b_record} &middot; {b_wr}% WR</div>
                </div>
            </div>
        </div>

        <!-- H2H Record -->
        <div class="h2h-block">
            <div class="h2h-label">Head-to-Head Record</div>
            <div class="h2h-score">
                <span class="a-wins">{h2h_a_wins}</span>
                <span class="dash">&mdash;</span>
                <span class="b-wins">{h2h_b_wins}</span>
            </div>
            <div class="split-bar-container">
                <div class="bar-a" style="width:{h2h_a_pct}%"></div>
                <div class="bar-b" style="width:{h2h_b_pct}%"></div>
            </div>
            <div class="split-bar-names">
                <span>{a_name}</span>
                <span>{b_name}</span>
            </div>
            {streak_html}
        </div>

        <!-- VS Stats -->
        {vs_stats_section}

        <!-- Teammate Section -->
        {teammate_html}

        <div class="footer-pad"></div>
    </div>
</div>
</body>
</html>
